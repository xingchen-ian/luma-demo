<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Object Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .sound-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            padding: 16px 24px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            z-index: 100;
        }
        .sound-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 24px rgba(0,0,0,0.25);
        }
        .sound-btn.playing {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <iframe 
        src="https://lumalabs.ai/embed/25b6cf96-408b-431b-9938-838d33c56f29?mode=sparkles&background=%23ffffff&color=%23000000&showTitle=true&loadBg=true&logoPosition=bottom-left&infoPosition=bottom-right&cinematicVideo=undefined&showMenu=false" 
        title="Luma AI 3D Scan"
        allow="xr-spatial-tracking"
        allowfullscreen
    ></iframe>
    
    <audio id="bgAudio" loop>
        <source src="audio.mp3" type="audio/mpeg">
    </audio>
    
    <button class="sound-btn" id="soundBtn" onclick="toggleSound()">
        🔇 点击播放声音
    </button>
    
    <script>
        const audio = document.getElementById('bgAudio');
        const btn = document.getElementById('soundBtn');
        let isPlaying = false;
        
        function toggleSound() {
            if (isPlaying) {
                audio.pause();
                btn.textContent = '🔇 点击播放声音';
                btn.classList.remove('playing');
            } else {
                audio.play();
                btn.textContent = '🔊 关闭声音';
                btn.classList.add('playing');
            }
            isPlaying = !isPlaying;
        }
    </script>
</body>
</html>
