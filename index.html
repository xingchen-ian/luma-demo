<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Object - Luma AI Scan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        .container {
            width: 100%;
            max-width: 960px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 500px;
            border: none;
            display: block;
        }
        .info {
            padding: 20px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>📦 3D Object Scan</h1>
    <div class="container">
        <iframe 
            src="https://lumalabs.ai/embed/25b6cf96-408b-431b-9938-838d33c56f29?mode=sparkles&background=%23ffffff&color=%23000000&showTitle=true&loadBg=true&logoPosition=bottom-left&infoPosition=bottom-right&cinematicVideo=undefined&showMenu=false" 
            title="Luma AI 3D Scan"
            allow="xr-spatial-tracking"
            allowfullscreen
        ></iframe>
    </div>
    <div class="info">
        <p>Scanned with Luma AI</p>
    </div>
</body>
</html>
